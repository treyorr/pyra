name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-version:
    name: verify-version
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm tag matches workspace version
        shell: bash
        run: |
          workspace_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ -z "${workspace_version}" ]; then
            echo "Failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi
          if [ "${workspace_version}" != "${tag_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi

  build:
    name: build-release (${{ matrix.target }})
    needs: verify-version
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p pyra-cli --bin pyra --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/pyra" dist/package/pyra
          tar -C dist/package -czf "dist/pyra-${{ matrix.target }}.tar.gz" pyra
          (
            cd dist
            shasum -a 256 "pyra-${{ matrix.target }}.tar.gz" > "pyra-${{ matrix.target }}.tar.gz.sha256"
          )

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\package | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\pyra.exe" "dist\package\pyra.exe"
          Compress-Archive -Path "dist\package\pyra.exe" -DestinationPath "dist\pyra-${{ matrix.target }}.zip" -Force
          $hash = (Get-FileHash "dist\pyra-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content "dist\pyra-${{ matrix.target }}.zip.sha256" "$hash  pyra-${{ matrix.target }}.zip"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  deploy-docs:
    name: deploy-docs
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs site for GitHub Pages
        working-directory: docs
        env:
          DOCS_SITE_URL: https://treyorr.github.io/pyra
          DOCS_BASE_PATH: /pyra
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
