[tools]
rust = "stable"
node = "lts"

[tasks.fmt]
description = "Format the Rust workspace"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks.check]
description = "Compile the workspace"
run = "cargo check --workspace --locked"

[tasks.clippy]
description = "Lint the workspace"
run = "cargo clippy --workspace --all-targets --locked -- -D warnings"

[tasks.test]
description = "Run the Rust test suite"
run = "cargo test --workspace --locked"

[tasks."verify:rust"]
description = "Run the Rust verification suite"
depends = ["fmt-check", "clippy", "test"]

[tasks.verify]
description = "Run the local CI-style verification suite"
depends = ["verify:rust", "docs:build"]

[tasks.build]
description = "Build the Rust workspace"
run = "cargo build --workspace"

[tasks."docs:dev"]
description = "Start the docs dev server"
run = "npm run dev"
dir = "docs"

[tasks."docs:build"]
description = "Build the docs site for production"
run = "npm run build"
dir = "docs"

[tasks."docs:preview"]
description = "Preview the built docs site"
run = "npm run preview"
dir = "docs"

[tasks."docs:install"]
description = "Install docs site dependencies"
run = "npm install"
dir = "docs"
